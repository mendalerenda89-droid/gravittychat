<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravitty – Asistente Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d0d; --surface: #181818; --surface2: #222222;
    --border: rgba(255,255,255,0.08); --accent: #e8ff47;
    --text: #f0f0f0; --muted: rgba(240,240,240,0.45);
    --bot-bubble: #1f1f1f; --radius: 18px;
  }
  body {
    font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .chat-widget {
    width: 100%; max-width: 420px; height: 680px; background: var(--surface);
    border-radius: 24px; border: 1px solid var(--border); display: flex;
    flex-direction: column; overflow: hidden;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(232,255,71,0.05);
  }
  .chat-header {
    padding: 20px 22px 18px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px; flex-shrink: 0;
    position: relative; overflow: hidden;
  }
  .chat-header::before {
    content: ''; position: absolute; top: -40px; right: -40px; width: 130px; height: 130px;
    background: radial-gradient(circle, rgba(232,255,71,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .avatar {
    width: 46px; height: 46px; background: var(--accent); border-radius: 14px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--bg);
    letter-spacing: 1px; position: relative;
  }
  .avatar::after {
    content: ''; position: absolute; bottom: -2px; right: -2px;
    width: 10px; height: 10px; background: #4ade80; border-radius: 50%; border: 2px solid var(--surface);
  }
  .header-info { flex: 1; }
  .header-name { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 2px; color: var(--text); line-height: 1; margin-bottom: 3px; }
  .header-name span { color: var(--accent); }
  .header-status { font-size: 11px; color: var(--muted); }
  .header-tag {
    font-size: 10px; font-weight: 600; letter-spacing: 1.5px; color: var(--accent);
    background: rgba(232,255,71,0.1); border: 1px solid rgba(232,255,71,0.2);
    padding: 4px 9px; border-radius: 6px; text-transform: uppercase;
  }
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 20px 18px; display: flex; flex-direction: column;
    gap: 12px; scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .msg-row { display: flex; gap: 10px; animation: msgIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes msgIn { from { opacity: 0; transform: translateY(10px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .msg-row.user { flex-direction: row-reverse; }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 9px; background: rgba(232,255,71,0.1);
    display: flex; align-items: center; justify-content: center; font-size: 13px;
    flex-shrink: 0; margin-top: 2px;
  }
  .msg-row.user .msg-avatar { background: rgba(232,255,71,0.18); }
  .msg-col { display: flex; flex-direction: column; gap: 8px; max-width: 82%; }
  .bubble { padding: 11px 15px; border-radius: var(--radius); font-size: 13.5px; line-height: 1.56; }
  .msg-row.bot .bubble { background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 6px; color: var(--text); }
  .msg-row.user .bubble { background: var(--accent); color: var(--bg); border-bottom-right-radius: 6px; font-weight: 500; }
  .quick-replies { display: flex; flex-wrap: wrap; gap: 7px; }
  .qr-btn {
    background: transparent; border: 1px solid rgba(232,255,71,0.3); color: var(--accent);
    font-size: 12px; font-weight: 500; padding: 6px 13px; border-radius: 20px;
    cursor: pointer; transition: all 0.16s ease; font-family: 'Inter', sans-serif;
  }
  .qr-btn:hover { background: rgba(232,255,71,0.1); border-color: var(--accent); transform: translateY(-1px); }
  .typing-indicator {
    display: flex; align-items: center; gap: 5px; padding: 12px 16px;
    background: var(--bot-bubble); border: 1px solid var(--border);
    border-radius: var(--radius); border-bottom-left-radius: 6px; width: fit-content;
  }
  .typing-dot { width: 6px; height: 6px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite ease-in-out; }
  .typing-dot:nth-child(2) { animation-delay: 0.18s; }
  .typing-dot:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-5px); opacity: 1; } }
  .chat-input-area { padding: 14px 16px 18px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .input-row {
    display: flex; align-items: center; gap: 10px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 14px; padding: 8px 8px 8px 16px; transition: border-color 0.2s;
  }
  .input-row:focus-within { border-color: rgba(232,255,71,0.3); }
  .chat-input {
    flex: 1; background: transparent; border: none; outline: none; color: var(--text);
    font-size: 13.5px; font-family: 'Inter', sans-serif; resize: none; max-height: 80px; line-height: 1.4;
  }
  .chat-input::placeholder { color: var(--muted); }
  .send-btn {
    width: 36px; height: 36px; background: var(--accent); border: none; border-radius: 10px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.16s ease; color: var(--bg);
  }
  .send-btn:hover { background: #d4ec2a; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 16px; height: 16px; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .input-hint { font-size: 10.5px; color: var(--muted); text-align: center; margin-top: 9px; }
  .input-hint a { color: rgba(232,255,71,0.45); text-decoration: none; }
  .demo-badge {
    position: fixed; top: 14px; right: 14px; background: var(--surface);
    border: 1px solid var(--border); padding: 5px 11px; border-radius: 20px; font-size: 11px; color: var(--muted);
  }
  .demo-badge span { color: var(--accent); }
</style>
</head>
<body>

<div class="demo-badge">Demo · <span>Webcerta</span></div>

<div class="chat-widget">
  <div class="chat-header">
    <div class="avatar">G</div>
    <div class="header-info">
      <div class="header-name">GRAVI<span>TTY</span></div>
      <div class="header-status">Humans in Motion · Lugo</div>
    </div>
    <div class="header-tag">IA</div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <div class="input-row">
      <textarea class="chat-input" id="userInput" placeholder="Escribe tu pregunta..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Asistente IA de Gravitty · <a href="https://gravitty.es" target="_blank">gravitty.es</a> · 604 003 626</div>
  </div>
</div>

<script>
  // ─────────────────────────────────────────────
  // ⚙️  CONFIGURACIÓN — cambia esta URL por la de tu Worker
  // ─────────────────────────────────────────────
  const WORKER_URL = "https://gravitty-chat.TU-USUARIO.workers.dev";
  // ─────────────────────────────────────────────

  let history = [];
  let loading = false;

  window.onload = () => {
    addBot(
      "¡Hola! 👋 Soy el asistente de **GRAVITTY**. ¿En qué puedo ayudarte hoy?",
      ["¿Qué disciplinas hay?", "¿Cómo me apunto?", "Horarios y precios", "¿Dónde estáis?"]
    );
  };

  function addBot(text, qrs = []) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    const av = document.createElement('div');
    av.className = 'msg-avatar'; av.textContent = '✦';
    const col = document.createElement('div'); col.className = 'msg-col';
    const bubble = document.createElement('div'); bubble.className = 'bubble';
    bubble.innerHTML = fmt(text); col.appendChild(bubble);
    if (qrs.length) {
      const qrDiv = document.createElement('div'); qrDiv.className = 'quick-replies';
      qrs.forEach(q => {
        const btn = document.createElement('button'); btn.className = 'qr-btn'; btn.textContent = q;
        btn.onclick = () => { document.querySelectorAll('.quick-replies').forEach(e => e.remove()); doSend(q); };
        qrDiv.appendChild(btn);
      });
      col.appendChild(qrDiv);
    }
    row.appendChild(av); row.appendChild(col); msgs.appendChild(row); scroll();
  }

  function addUser(text) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div'); row.className = 'msg-row user';
    const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = '◉';
    const col = document.createElement('div'); col.className = 'msg-col'; col.style.alignItems = 'flex-end';
    const bubble = document.createElement('div'); bubble.className = 'bubble'; bubble.textContent = text;
    col.appendChild(bubble); row.appendChild(col); row.appendChild(av); msgs.appendChild(row); scroll();
  }

  function showTyping() {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div'); row.className = 'msg-row bot'; row.id = 'typing';
    const av = document.createElement('div'); av.className = 'msg-avatar'; av.textContent = '✦';
    const t = document.createElement('div'); t.className = 'typing-indicator';
    for (let i = 0; i < 3; i++) { const d = document.createElement('div'); d.className = 'typing-dot'; t.appendChild(d); }
    row.appendChild(av); row.appendChild(t); msgs.appendChild(row); scroll();
  }

  function hideTyping() { const el = document.getElementById('typing'); if (el) el.remove(); }
  function fmt(t) { return t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
  function scroll() { const msgs = document.getElementById('messages'); setTimeout(() => msgs.scrollTop = msgs.scrollHeight, 40); }
  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 80) + 'px'; }

  function sendMessage() {
    const inp = document.getElementById('userInput');
    const text = inp.value.trim();
    if (!text || loading) return;
    inp.value = ''; inp.style.height = 'auto';
    document.querySelectorAll('.quick-replies').forEach(e => e.remove());
    doSend(text);
  }

  async function doSend(text) {
    if (loading) return;
    addUser(text);
    history.push({ role: 'user', content: text });
    loading = true;
    document.getElementById('sendBtn').disabled = true;
    showTyping();

    try {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });
      const data = await res.json();
      hideTyping();
      const reply = data.content?.[0]?.text || 'Lo siento, ocurrió un error. Llámanos al 604 003 626.';
      history.push({ role: 'assistant', content: reply });
      addBot(reply, getQR(text));
    } catch (e) {
      hideTyping();
      addBot('Ups, algo falló 😅 Llámanos al **604 003 626** o escribe a info@gravitty.es');
    }

    loading = false;
    document.getElementById('sendBtn').disabled = false;
  }

  function getQR(msg) {
    const m = msg.toLowerCase();
    if (m.includes('disciplina') || m.includes('clase') || m.includes('activi')) return ['¿Hay clases para niños?', '¿Cómo me apunto?', 'Precios y bonos'];
    if (m.includes('apunt') || m.includes('inscri') || m.includes('matricul')) return ['¿Dónde estáis?', '¿Hay clase de prueba?', 'Llamar ahora'];
    if (m.includes('precio') || m.includes('tarifa') || m.includes('bono')) return ['¿Cómo me apunto?', '¿Qué disciplinas hay?', '¿Dónde estáis?'];
    if (m.includes('niño') || m.includes('peque')) return ['¿Desde qué edad?', '¿Hay clase de prueba?', 'Horarios infantiles'];
    if (m.includes('competi') || m.includes('club')) return ['¿Cómo unirse al club?', '¿Qué logros tienen?', 'Más disciplinas'];
    if (m.includes('dónde') || m.includes('direcci')) return ['¿Cuál es vuestro horario?', '¿Cómo me apunto?', 'Llamar ahora'];
    return ['¿Tenéis clases para adultos?', '¿Clase de prueba gratuita?', 'Contactar Gravitty'];
  }
</script>
</body>
</html>
